syntax = "proto3";
package frontcontrol;

option go_package = "./frontcontrolpb";

import "google/protobuf/timestamp.proto";


message CreateUserRequest {
    string username = 1;
    string password = 2;
    string email = 3;
}

message CreateUserResponse {
    string user_id = 1;
    bool success = 2;
}

message AuthenticateUserRequest {
    string email = 1;
    string password = 2;
}

message AuthenticateUserResponse {
    string token = 1;
    bool success = 2;
}

message Image {
    string id = 1;
    string name = 2;
    string status = 3;
    string tags = 4; // CSV format
    string container_format = 5;
    string disk_format = 6;
    int32 min_disk_gigabytes = 7;
    int32 min_ram_megabytes = 8;
    string owner = 9;
    bool protected = 10;
    string visibility = 11;
    bool hidden = 12;
    string checksum = 13;
    int64 size_bytes = 14;
    google.protobuf.Timestamp created_at = 15;
    google.protobuf.Timestamp updated_at = 16;
    string file = 17;
    string schema = 18;
    int64 virtual_size = 19;
    string import_methods = 20; // CSV format
    string store_ids = 21;      // CSV format
}

message Flavor {
    string id = 1;
    string name = 2;
    int32 disk = 3;
    int32 ram = 4;
    int32 vcpus = 5;
    double rxtx_factor = 6;
    int32 swap = 7;
    int32 ephemeral = 8;
    bool is_public = 9;
    string description = 10;
    string extra_specs = 11; // JSON serialized
}

message Network {
    string id = 1;
    string name = 2;
    string description = 3;
    bool admin_state_up = 4;
    string status = 5;
    string tenant_id = 6;
    string project_id = 7;
    bool shared = 8;
    int32 revision_number = 9;
    string subnets = 10;                  // CSV
    string availability_zone_hints = 11;  // CSV
    string tags = 12;                     // CSV
}

message CreateConfigRequest {
    string user = 1;
    string key = 2;
    string value = 3;
}

message CreateConfigResponse {
    bool success = 1;
}

message UpdateConfigRequest {
    string user = 1;
    string key = 2;
    string value = 3;
}

message UpdateConfigResponse {
    bool success = 1;
}

message DeleteConfigRequest {
    string user = 1;
    string key = 2;
}

message DeleteConfigResponse {
    bool success = 1;
}

message GetConfigRequest {
    string user = 1;
    string key = 2;
}

message GetConfigResponse {
    string value = 1;
    string key = 2;
}

message CreatePoolRequest {
    string user = 1;
    string name = 2;
    string image = 3;
    string flavor = 4;
    string network = 5;
    string config = 6;
    string min_vm = 7;
    string max_vm = 8;
    map<string, string> metadata = 9;
}

message CreatePoolResponse {
    string pool_id = 1;
    bool success = 2;
}

message DeletePoolRequest {
    string user = 1;
    string pool_id = 2;
}

message DeletePoolResponse {
    bool success = 1;
}

message GetPoolRequest {
    string user = 1;
    string pool_id = 2;
}

message GetPoolResponse {
    reserved 8;
    string name = 1;
    string image = 2;
    string flavor = 3;
    string network = 4;
    string config = 5;
    int32 min_vm = 6;
    int32 max_vm = 7;
}

message UpdateDataUserRequest {
    string user = 1;
}

enum Status {
    STATUS_UNKNOWN = 0;
    CREATE = 1;
    UPDATE = 2;
    DELETE = 3;
}

enum Type {
    TYPE_UNKNOWN = 0;
    SERVERPOOL = 1;
    SERVER = 2;
    CONFIG = 3;
}

message UpdateDataUserResponse {
    string user = 1;
    Status status = 2;
    Type type = 3;
    map<string, string> data = 4;
}

message RebuildServerRequest {
    string user = 1;
    string pool_id = 2;
    string server_id = 3;
}

message RebuildServerResponse {
    bool success = 1;
}

message UserRequest {
    string user = 1;
}

message Server {
    string id = 1;
    string name = 2;
    string status = 3;
    string image = 4;
    string flavor = 5;
    string network = 6;
    string ip_address = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
    map<string, string> metadata = 10;
    string user_id = 11;
}

message ServerPool {
    string id = 1;
    string name = 2;
    string image = 3;
    string flavor = 4;
    string network = 5;
    string config = 6;
    int32 min_vm = 7;
    int32 max_vm = 8;
    map<string, string> metadata = 9;
    string user_id = 10;
}

message Config {
    string user_id = 1;
    string name = 2;
    string data = 3;
}

message ExistData {
    bool exist = 1;
}

service AuthService {
    rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
    rpc AuthenticateUser (AuthenticateUserRequest) returns (AuthenticateUserResponse);
}

service GatherDataService {
    rpc GetAllImages ( UserRequest ) returns (stream Image);
    rpc GetAllFlavors ( UserRequest ) returns (stream Flavor);
    rpc GetAllNetworks ( UserRequest ) returns (stream Network);
    rpc ExistServer ( UserRequest ) returns ( ExistData );
    rpc ExistServerPools ( UserRequest ) returns ( ExistData );
    rpc ExistConfigs ( UserRequest ) returns ( ExistData );
    rpc GetAllServers ( UserRequest ) returns (stream Server);
    rpc GetAllServerPools ( UserRequest ) returns (stream ServerPool);
    rpc GetAllConfigs ( UserRequest ) returns (stream Config);

}

service ConfigService {
    rpc CreateConfig (CreateConfigRequest) returns (CreateConfigResponse);
    rpc UpdateConfig (UpdateConfigRequest) returns (UpdateConfigResponse);
    rpc DeleteConfig (DeleteConfigRequest) returns (DeleteConfigResponse);
    rpc GetConfig (GetConfigRequest) returns (GetConfigResponse);
}

service PoolService {
    rpc CreatePool (CreatePoolRequest) returns (CreatePoolResponse);
    rpc GetPool (GetPoolRequest) returns (GetPoolResponse);
    rpc GetAllPools (GetPoolRequest) returns (stream GetPoolResponse);
    rpc DeletePool (DeletePoolRequest) returns (DeletePoolResponse);
    rpc RebuildServer (RebuildServerRequest) returns (RebuildServerResponse);
    rpc AddServer (CreatePoolRequest) returns (RebuildServerResponse);
}

service UserService {
    rpc UpdateDataUser (UpdateDataUserRequest) returns (stream UpdateDataUserResponse);
}