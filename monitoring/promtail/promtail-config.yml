# Promtail tourne sur la MACHINE qui héberge les services (les logs y sont),
# et pousse vers Loki sur la VM infra. Lancer avec -config.expand-env=true.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://${LOKI_HOST}:3100/loki/api/v1/push

scrape_configs:
  - job_name: cloudpoolmanager
    static_configs:
      - targets: [localhost]
        labels:
          job: cloudpoolmanager
          host: ${PROMTAIL_HOST_LABEL}
          __path__: /logs/*.log
