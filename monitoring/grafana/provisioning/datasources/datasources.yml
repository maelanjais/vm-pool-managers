apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100

  # Données « métier » directement depuis PostgreSQL (lecture seule).
  # Permet des dashboards d'usage à partir des tables existantes
  # (vm_instances, serverpools, students, github_sessions…).
  - name: CloudPoolManager PostgreSQL
    type: postgres
    access: proxy
    url: ${CPM_PG_HOST}:5432
    database: ${CPM_PG_DB}
    user: ${CPM_PG_USER}
    secureJsonData:
      password: ${CPM_PG_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1500
